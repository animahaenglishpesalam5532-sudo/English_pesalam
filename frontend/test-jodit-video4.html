<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="node_modules/jodit/build/jodit.min.css">
  <script src="node_modules/jodit/build/jodit.min.js"></script>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    const editor = Jodit.make('#editor', {
      events: {
        beforeInsertNode: function (node) {
          if (node.nodeType === 3 && node.nodeValue.includes('youtu')) {
             const div = document.createElement('div');
             div.innerHTML = '<b>REPLACED YOUTUBE</b>';
             return div;
          }
        }
      }
    });
    // test insert
    editor.s.insertNode(editor.createInside.text('https://youtu.be/test'));
    console.log(editor.value);
  </script>
</body>
</html>

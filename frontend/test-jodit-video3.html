<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="node_modules/jodit/build/jodit.min.css">
  <script src="node_modules/jodit/build/jodit.min.js"></script>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    const editor = Jodit.make('#editor', {
      events: {
        beforeInsertNode: function (node) {
          console.log('BEFORE_INSERT_NODE', node.nodeType, node.nodeName, node.outerHTML, node.nodeValue);
        }
      }
    });
    // Let's call the video command manually!
    const link = 'https://youtu.be/rxdlKVLlGNc?si=d1vO3q9H98biCsWM';
    editor.s.insertNode(editor.createInside.text(link));
  </script>
</body>
</html>

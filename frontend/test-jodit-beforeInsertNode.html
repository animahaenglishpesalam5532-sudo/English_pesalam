<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="node_modules/jodit/build/jodit.min.css">
  <script src="node_modules/jodit/build/jodit.min.js"></script>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    const editor = Jodit.make('#editor', {
      events: {
        beforeInsertNode: function (node) {
          if (node.nodeType === 3 && node.nodeValue.includes('replace')) {
             const div = document.createElement('div');
             div.innerText = 'REPLACED';
             return div;
          }
        }
      }
    });
    editor.s.insertNode(editor.createInside.text('replace me'));
    console.log("HTML after replace:", editor.value);
  </script>
</body>
</html>
